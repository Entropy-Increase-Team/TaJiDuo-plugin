# 帮助内容默认配置
# 如需自定义，可复制本文件到 config/config/help.yaml 后修改

help:
  title: 塔吉多插件帮助
  groups:
    - title: 帮助命令
      list:
        - title: tjd帮助 / tof帮助 / nte帮助
          desc: 查看插件帮助

    - title: 登录命令
      list:
        - title: tjd登录 13800138000
          desc: 发送验证码并等待下一条 6 位验证码
        - title: tjd账号
          desc: 查看当前登录账号
        - title: tjd刷新登录
          desc: 刷新当前登录账号
        - title: tjd退出登录
          desc: 退出当前登录
        - title: tjd删除账号
          desc: 删除当前登录账号

    - title: 社区命令
      list:
        - title: tjd社区签到
          desc: 提交幻塔 + 异环社区签到任务并展示结果
        - title: tjd社区查询
          desc: 查询幻塔 + 异环社区状态与任务进度
        - title: tof社区签到
          desc: 提交幻塔社区签到任务并等待结果
        - title: tof社区查询
          desc: 查询幻塔社区状态与任务进度
        - title: nte社区签到
          desc: 提交异环社区签到任务并等待结果
        - title: nte社区查询
          desc: 查询异环社区状态与任务进度

    - title: 商城命令
      list:
        - title: tjd商城
          desc: 查询商城商品列表，发送后会提示选择账号
        - title: tjd商品 8
          desc: 查询指定商品详情，支持 商品ID 或 商品名称
        - title: tjd塔币查询
          desc: 查询当前塔吉多币状态，发送后会提示选择账号
        - title: tjd商城角色列表
          desc: 查询当前账号的商城角色列表，发送后会提示选择账号
        - title: tjd兑换商品 10 1
          desc: 按 商品ID 或 商品名称 + 数量 执行兑换，发送后会提示选择账号

    - title: 兑换码命令
      list:
        - title: tjd兑换码
          desc: 查看当前全部可用兑换码
        - title: tof兑换码
          desc: 查看幻塔当前可用兑换码
        - title: nte兑换码
          desc: 查看异环当前可用兑换码

  notes:
    - 命令前缀支持：tjd / tof / nte
    - 帮助命令支持：tjd帮助 / tof帮助 / nte帮助
    - 总命令使用 tjd；幻塔快捷命令使用 tof；异环快捷命令使用 nte
    - 只有 tjd登录 <手机号> 和后续 6 位验证码需要私聊发送
    - tjd账号、tjd刷新登录、tjd退出登录、tjd删除账号 支持群聊触发
    - tjd商城、tjd商品、tjd塔币查询、tjd商城角色列表、tjd兑换商品 需要先登录
    - 商城相关命令发送后，如存在多个账号，会提示回复序号选择账号
    - tjd兑换码、tof兑换码、nte兑换码 不需要登录即可使用
    - 仍兼容 tjd幻塔社区签到、tjd异环社区签到、tjd幻塔社区查询、tjd异环社区查询
    - 已登录账号会在每天 00:20 自动执行社区签到
