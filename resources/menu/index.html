<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=724, initial-scale=1">
  <title>{{pageTitle}}</title>
  <link rel="stylesheet" href="{{_res_path}}menu/style.css">
</head>
<body>
  <div class="menu-page" style="background-image: url('{{_res_path}}menu/bg.png');">
    <div class="page-overlay">
      <div class="menu-card">
        <div class="page-title">{{pageTitle}}</div>
        <div class="page-subtitle">{{pageSubtitle}}</div>

        {{each menuSections section}}
        <section class="command-section">
          <div class="section-title">{{section.title}}</div>
          <div class="command-list">
            {{each section["items"] item}}
            <div class="command-item">
              <div class="command-main">{{item.command}}</div>
              <div class="command-desc">{{item.description}}</div>
            </div>
            {{/each}}
          </div>
        </section>
        {{/each}}

        <section class="notes-section">
          <div class="section-title">{{notesTitle}}</div>
          <div class="notes-list">
            {{each notes item}}
            <div class="note-item">{{item}}</div>
            {{/each}}
          </div>
        </section>
      </div>
    </div>
  </div>
</body>
</html>
