<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>{{pageTitle}}</title>
  <link rel="stylesheet" href="{{_res_path}}yihuan/style.css">
</head>
<body>
  <main class="nte-page team-page">
    <header class="role-title">
      <div class="title-banner" style="background-image: linear-gradient(90deg, rgba(12, 16, 25, 0.46), rgba(12, 16, 25, 0.12) 62%, rgba(255, 255, 255, 0.12)), url('{{_res_path}}yihuan/img/card_long/{{cardLongId}}.png');"></div>
      <div class="avatar-wrap"><img src="{{avatarUrl}}"></div>
      <div class="role-name">{{query}}</div>
      <div class="uid-pill">官方推荐</div>
    </header>

    {{each teams team}}
    <section class="team-card">
      <div class="team-head">
        <img class="team-icon" src="{{team.iconUrl}}">
        <div>
          <div class="team-name">{{team.name}}</div>
          <div class="team-id">{{team.id}}</div>
        </div>
      </div>

      {{each team.sections section}}
      <div class="panel-section-title team-section-title">
        <img src="{{_res_path}}yihuan/img/character/section_battle_skill_icon.png">
        <div>{{section.title}}<span>CHARACTER ATTRIBUTE</span></div>
      </div>
      <img class="team-section-img" src="{{section.imageUrl}}">
      {{/each}}

      {{if team.desc}}
      <div class="panel-section-title team-section-title">
        <img src="{{_res_path}}yihuan/img/character/char_section_attr.png">
        <div>推荐详情<span>CHARACTER ATTRIBUTE</span></div>
      </div>
      <div class="team-desc">{{team.desc}}</div>
      {{/if}}
    </section>
    {{/each}}

    <footer class="footer">{{footerText}}</footer>
  </main>
</body>
</html>
