<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>{{pageTitle}}</title>
  <link rel="stylesheet" href="{{_res_path}}yihuan/style.css">
</head>
<body>
  <main class="nte-page character-page realtime-page">
    <header class="role-title">
      <div class="title-banner" style="background-image: linear-gradient(90deg, rgba(12, 16, 25, 0.46), rgba(12, 16, 25, 0.12) 62%, rgba(255, 255, 255, 0.12)), url('{{_res_path}}yihuan/img/card_long/{{cardLongId}}.png');"></div>
      <div class="avatar-wrap"><img src="{{avatarUrl}}"></div>
      <div class="role-name">{{roleName}}</div>
      <div class="uid-pill">UID {{uid}}</div>
      {{if roleLevel}}<div class="title-level">{{roleLevel}}</div>{{/if}}
    </header>

    <section class="realtime-panel">
      <div class="realtime-title">实时信息<span>REAL - TIME INFORMATION</span></div>
      <div class="realtime-grid">
        {{each stats item}}
        <div class="realtime-card">
          <div class="realtime-value">{{item.value}}<span>/{{item.max}}</span></div>
          <div class="realtime-label">{{item.label}}</div>
          <div class="progress-line"><span style="width: {{item.percent}}%"></span></div>
        </div>
        {{/each}}
      </div>
    </section>

    <footer class="footer">{{footerText}}</footer>
  </main>
</body>
</html>
