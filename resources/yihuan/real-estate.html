<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>{{pageTitle}}</title>
  <link rel="stylesheet" href="{{_res_path}}yihuan/style.css">
</head>
<body>
  <main class="nte-page">
    <header class="role-title">
      <div class="title-banner" style="background-image: linear-gradient(90deg, rgba(12, 16, 25, 0.46), rgba(12, 16, 25, 0.12) 62%, rgba(255, 255, 255, 0.12)), url('{{_res_path}}yihuan/img/card_long/{{cardLongId}}.png');"></div>
      <div class="avatar-wrap"><img src="{{avatarUrl}}"></div>
      <div class="role-name">{{roleName}}</div>
      <div class="uid-pill">UID {{uid}}</div>
      {{if roleLevel}}<div class="title-level">{{roleLevel}}</div>{{/if}}
    </header>

    <section class="cards">
      {{each houses house}}
      <article class="house-card">
        <div class="house-head"><img src="{{_res_path}}yihuan/img/realestate/pin.png">{{house.name}}</div>
        <div class="house-main">
          <img class="house-image" src="{{house.imageUrl}}">
          <div>
            <div class="chip">邀约入住</div>
            <div class="resident-grid">
              {{each house.residents avatar}}
              <img src="{{avatar}}">
              {{/each}}
            </div>
          </div>
        </div>
        <div class="subhead"><img src="{{_res_path}}yihuan/img/realestate/sec_icon.png">异象家具</div>
        <div class="furniture-grid">
          {{each house.furniture item}}
          <div class="furniture {{item.lockClass}}">
            {{if item.owned}}<img src="{{item.iconUrl}}">{{/if}}
          </div>
          {{/each}}
        </div>
      </article>
      {{/each}}
      {{if houses.length === 0}}
      <div class="empty">暂无房产数据</div>
      {{/if}}
    </section>
    <footer class="footer">{{footerText}}</footer>
  </main>
</body>
</html>
