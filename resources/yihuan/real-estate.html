<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="724, initial-scale=1">
  <title>异环房产</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 724px;
      min-height: 100vh;
      background: #071015;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #e0e0e0;
    }

    .page {
      position: relative;
      padding: 20px;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(0, 180, 220, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(120, 80, 220, 0.10) 0%, transparent 50%),
        linear-gradient(180deg, #0a1628 0%, #071015 40%, #0d1a2d 100%);
    }

    .page::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00b4dc, #7c50dc, #ff6b9d);
    }

    .card {
      position: relative;
      margin-bottom: 16px;
      padding: 20px;
      background: linear-gradient(180deg, rgba(14, 22, 36, 0.85), rgba(10, 16, 28, 0.92));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20px;
      right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 180, 220, 0.4), transparent);
    }

    .header-card {
      text-align: center;
      padding: 28px 20px;
    }

    .page-title {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #00d4ff, #7c6fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .section-head .bar {
      width: 4px;
      height: 20px;
      border-radius: 2px;
      background: linear-gradient(180deg, #00d4ff, #7c6fff);
    }

    .section-head .title {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-item {
      text-align: center;
      padding: 12px 4px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #ffd700;
    }

    .estate-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .estate-card {
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .estate-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(255, 215, 0, 0.10);
      border: 1px solid rgba(255, 215, 0, 0.20);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .estate-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .estate-status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .estate-status.owned {
      color: #7ce8ff;
    }

    .no-data {
      text-align: center;
      padding: 24px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 14px;
    }

    .footer {
      text-align: center;
      padding: 12px 0 4px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="card header-card">
      <div class="page-title">异环房产</div>
      <div class="page-subtitle">{{role.roleName || role.roleId || '异环'}}</div>
    </div>

    <div class="card">
      <div class="section-head">
        <div class="bar"></div>
        <div class="title">总览</div>
      </div>
      <div class="stat-row">
        <div class="stat-item">
          <div class="stat-label">拥有</div>
          <div class="stat-value">{{owned || 0}}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">总数</div>
          <div class="stat-value">{{total || 0}}</div>
        </div>
      </div>
    </div>

    {{if detail && detail.length > 0}}
    <div class="card">
      <div class="section-head">
        <div class="bar"></div>
        <div class="title">房产列表</div>
      </div>
      <div class="estate-grid">
        {{each detail item}}
        <div class="estate-card">
          <div class="estate-icon">🏠</div>
          <div>
            <div class="estate-name">{{item.name || item.id || '未知'}}</div>
            <div class="estate-status {{isOwned(item) ? 'owned' : ''}}">{{isOwned(item) ? '已拥有' : '未拥有'}}</div>
          </div>
        </div>
        {{/each}}
      </div>
    </div>
    {{else}}
    <div class="card">
      <div class="no-data">暂无房产数据</div>
    </div>
    {{/if}}

    <div class="footer">Created By TRSS-Yunzai & TaJiDuo-plugin</div>
  </div>
</body>

</html>
