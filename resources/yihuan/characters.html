<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>{{pageTitle}}</title>
  <link rel="stylesheet" href="{{_res_path}}yihuan/style.css">
</head>
<body class="refresh-body" style="height: {{refreshHeight}}px;">
  <main class="refresh-page" style="height: {{refreshHeight}}px;">
    <div class="refresh-stage" style="height: {{stageHeight}}px;">
      <header class="refresh-header">
        <section class="refresh-player-card">
          <div class="refresh-avatar"><img src="{{avatarUrl}}"></div>
          <div class="refresh-banner" style="background-image: linear-gradient(90deg, rgba(36, 37, 48, 0.52), rgba(48, 48, 60, 0.18)), url('{{_res_path}}yihuan/img/card_long/{{cardLongId}}.png');"></div>
          <div class="refresh-role-name">{{roleName}}</div>
          <div class="refresh-uid">UID {{uid}}</div>
          <div class="refresh-level">{{roleLevel}}</div>
        </section>
      </header>

      <section class="refresh-grid">
        {{each characters item}}
        <div class="refresh-char {{item.ownedClass}}">
          <div class="refresh-char-avatar"><img src="{{item.avatarUrl}}"></div>
          <div class="refresh-awaken">{{item.awaken}}觉</div>
          <div class="refresh-char-name">{{item.name}}</div>
        </div>
        {{/each}}
        {{if !characters.length}}
        <div class="empty">暂无角色数据</div>
        {{/if}}
      </section>

      <footer class="footer">{{footerText}}</footer>
    </div>
  </main>
</body>
</html>
