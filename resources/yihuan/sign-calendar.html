<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>{{pageTitle}}</title>
  <link rel="stylesheet" href="{{_res_path}}yihuan/style.css">
</head>
<body>
  <main class="nte-page character-page calendar-page {{gameCode}}-calendar">
    <header class="role-title">
      <div class="title-banner" style="background-image: linear-gradient(90deg, rgba(12, 16, 25, 0.46), rgba(12, 16, 25, 0.12) 62%, rgba(255, 255, 255, 0.12)), url('{{_res_path}}yihuan/img/card_long/{{cardLongId}}.png');"></div>
      <div class="avatar-wrap"><img src="{{avatarUrl}}"></div>
      <div class="role-name">{{roleName}}</div>
      <div class="uid-pill">{{subtitle}}</div>
    </header>

    {{each accounts account}}
    <section class="calendar-panel">
      <div class="calendar-head">
        <div>
          <div class="calendar-name">{{account.name}}</div>
          <div class="calendar-summary">{{account.summary}}</div>
        </div>
        <div class="calendar-state {{account.stateClass}}">{{account.todayText}}</div>
      </div>
      <div class="calendar-grid">
        {{each account.rewards reward}}
        <div class="calendar-day {{reward.className}}">
          <div class="calendar-day-no">{{reward.day}}</div>
          <div class="calendar-reward">{{reward.name}}</div>
          <div class="calendar-count">x{{reward.num}}</div>
        </div>
        {{/each}}
      </div>
    </section>
    {{/each}}

    <footer class="footer">{{footerText}}</footer>
  </main>
</body>
</html>
