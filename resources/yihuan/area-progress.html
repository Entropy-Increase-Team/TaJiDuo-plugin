<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>{{pageTitle}}</title>
  <link rel="stylesheet" href="{{_res_path}}yihuan/style.css">
</head>
<body>
  <main class="nte-page">
    <header class="role-title">
      <div class="title-banner" style="background-image: linear-gradient(90deg, rgba(12, 16, 25, 0.46), rgba(12, 16, 25, 0.12) 62%, rgba(255, 255, 255, 0.12)), url('{{_res_path}}yihuan/img/card_long/{{cardLongId}}.png');"></div>
      <div class="avatar-wrap"><img src="{{avatarUrl}}"></div>
      <div class="role-name">{{roleName}}</div>
      <div class="uid-pill">UID {{uid}}</div>
      {{if roleLevel}}<div class="title-level">{{roleLevel}}</div>{{/if}}
    </header>

    <section class="cards">
      {{each areas area}}
      <article class="list-card">
        <div class="area-banner">
          <img src="{{area.bannerUrl}}">
          <div class="area-band">
            <div class="area-info">
              <div class="area-name">{{area.name}}</div>
              <div class="progress-line"><span style="width: {{area.percent}}%;"></span></div>
            </div>
            <div class="area-big">{{area.progress}}<span>探索值</span></div>
          </div>
        </div>
        <div class="detail-title"><img src="{{_res_path}}yihuan/img/explore/book.png">地图游记</div>
        <div class="area-detail-grid">
          {{each area.detail item}}
          <div class="area-detail">
            <img src="{{item.iconUrl}}">
            <div>
              <div class="detail-name">{{item.name}}</div>
              <div class="detail-value">已发现: {{item.progress}} / {{item.total}}</div>
            </div>
          </div>
          {{/each}}
        </div>
      </article>
      {{/each}}
      {{if areas.length === 0}}
      <div class="empty">暂无区域探索数据</div>
      {{/if}}
    </section>
    <footer class="footer">{{footerText}}</footer>
  </main>
</body>
</html>
